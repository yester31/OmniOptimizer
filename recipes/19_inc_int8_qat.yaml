# PARKED — INC QAT requires a training loop (loss, optimizer, epochs) which
# this repository does not have yet. The recipe + schema fields exist so the
# YAML parses cleanly, and the runner dispatcher routes this through the INC
# path, but `make all` excludes it (same treatment as recipe #7 trt_int8_sparsity
# and #11 modelopt_int8_sparsity). Reactivate this recipe when sparsity-aware
# training lands — the two parked families converge on the same missing piece.
name: inc_int8_qat
model:
  family: yolo26
  variant: n
  weights: yolo26n.pt
  ultralytics_version: null
runtime:
  engine: tensorrt
  version: null
  dtype: int8
technique:
  name: int8_qat
  source: neural_compressor
  # QAT learns activation/weight scales during training — calibrator field is
  # unused at runtime, left as a placeholder so the schema validates.
  calibrator: minmax
  calibration_samples: 0
  calibration_dataset: coco_train2017
  calibration_seed: 42
  # QAT-specific hyperparameters. Runner does not consume these yet; they
  # document intent for the eventual training pipeline.
  qat_epochs: 3
  qat_lr: 1.0e-5
hardware:
  gpu: null
  cuda: null
  driver: null
measurement:
  dataset: coco_val2017
  num_images: 500
  warmup_iters: 100
  measure_iters: 100
  batch_sizes: [1, 8]
  input_size: 640
  gpu_clock_lock: true
  seed: 42
constraints:
  # QAT should exceed PTQ accuracy by construction; if a future run can't
  # beat the 1%p budget, the QAT setup is wrong.
  max_map_drop_pct: 0.5
  min_fps_bs1: 30
