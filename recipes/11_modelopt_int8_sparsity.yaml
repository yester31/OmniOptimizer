name: modelopt_int8_sparsity
model:
  family: yolo26
  variant: n
  weights: yolo26n.pt
  ultralytics_version: null
runtime:
  engine: tensorrt
  version: null
  dtype: int8
  sparsity: "2:4"              # structured Ampere 2:4 sparsity on INT8 tensors
technique:
  name: int8_ptq_sparse
  source: modelopt
  calibrator: entropy          # Phase 2 best: mAP drop -1.7%p
  calibration_samples: 512
  calibration_dataset: coco_val2017
  calibration_seed: 42
  sparsity_preprocess: "2:4"   # v1.2: real 2:4 via modelopt.torch.sparsify
hardware:
  gpu: null
  cuda: null
  driver: null
  requires_compute_capability_min: 8.0
measurement:
  dataset: coco_val2017
  num_images: 500
  warmup_iters: 100
  measure_iters: 100
  batch_sizes: [1, 8]
  input_size: 640
  gpu_clock_lock: true
  seed: 42
constraints:
  max_map_drop_pct: 1.0
  min_fps_bs1: 30
