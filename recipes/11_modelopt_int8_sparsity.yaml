name: modelopt_int8_sparsity
model:
  family: yolo26
  variant: n
  weights: yolo26n.pt
  ultralytics_version: null
runtime:
  engine: tensorrt
  version: null
  dtype: int8
  sparsity: "2:4"              # structured Ampere 2:4 sparsity on INT8 tensors
technique:
  name: int8_ptq_sparse
  source: modelopt
  calibrator: entropy          # Phase 2 best: mAP drop -1.7%p
  calibration_samples: 512
  calibration_dataset: coco_val2017
  calibration_seed: 42
  # v1.2 update: sparsity_preprocess="2:4" was tested and rejected on YOLO26n.
  # Post-training magnitude pruning without SAT/QAT collapses mAP (see
  # report.md "Known limitations"). The runtime.sparsity flag below remains
  # for the SPARSE_WEIGHTS hint (harmless no-op on dense weights). Real 2:4
  # with sparsity-aware training is deferred to v1.3.
  # sparsity_preprocess: "2:4"
hardware:
  gpu: null
  cuda: null
  driver: null
  requires_compute_capability_min: 8.0
measurement:
  dataset: coco_val2017
  num_images: 500
  warmup_iters: 100
  measure_iters: 100
  batch_sizes: [1, 8]
  input_size: 640
  gpu_clock_lock: true
  seed: 42
constraints:
  max_map_drop_pct: 1.0
  min_fps_bs1: 30
