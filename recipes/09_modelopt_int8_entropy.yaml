name: modelopt_int8_entropy
model:
  family: yolo26
  variant: n
  weights: yolo26n.pt
  ultralytics_version: null
runtime:
  engine: tensorrt
  version: null
  dtype: int8
  # Wave 15 D2 attempted opt_level=5 here and ROLLED BACK after measurement:
  # bs1 -0.8% and bs8 -60% on RTX 3060 Laptop (QR, 2026-04-23). INT8 modelopt
  # recipes sit near the tactic-selection ceiling at opt_level=3, and opt_level=5
  # shifts to different bs8 kernels that regress throughput. Fp16 baselines
  # with more headroom (Wave 14 #40) still benefit; INT8 modelopt does not.
  # Evidence: docs/improvements/2026-04-23-wave15-results.md
technique:
  name: int8_ptq
  source: modelopt
  calibrator: entropy          # KL-divergence entropy calibration
  calibration_samples: 512
  calibration_dataset: coco_val2017
  calibration_seed: 42
hardware:
  gpu: null
  cuda: null
  driver: null
measurement:
  dataset: coco_val2017
  num_images: 500
  warmup_iters: 100
  measure_iters: 100
  batch_sizes: [1, 8]
  input_size: 640
  gpu_clock_lock: true
  seed: 42
constraints:
  max_map_drop_pct: 1.0
  min_fps_bs1: 30
