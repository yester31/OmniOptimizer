name: inc_int8_smoothquant
model:
  family: yolo26
  variant: n
  weights: yolo26n.pt
  ultralytics_version: null
runtime:
  engine: tensorrt
  version: null
  dtype: int8
technique:
  name: int8_ptq
  source: neural_compressor     # INC with SmoothQuant recipe
  # SmoothQuant: migrate activation outliers into weight scales so INT8
  # activations fit a tighter range. Expected to help YOLO necks where
  # Concat + 1x1 Conv creates wide activation tails.
  # alpha=0.5 is hard-coded in _prepare_inc_onnx for v1; sweep is future work.
  calibrator: smoothquant
  calibration_samples: 512
  calibration_dataset: coco_val2017
  calibration_seed: 42
hardware:
  gpu: null
  cuda: null
  driver: null
measurement:
  dataset: coco_val2017
  num_images: 500
  warmup_iters: 100
  measure_iters: 100
  batch_sizes: [1, 8]
  input_size: 640
  gpu_clock_lock: true
  seed: 42
constraints:
  max_map_drop_pct: 2.0
  min_fps_bs1: 30
