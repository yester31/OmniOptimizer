name: ort_cpu_int8_dynamic
model:
  family: yolo26
  variant: n
  weights: yolo26n.pt
  ultralytics_version: null
runtime:
  engine: onnxruntime
  dtype: int8
technique:
  name: int8_dynamic
  source: ort_cpu
  calibrator: null       # null → weight-only dynamic (runtime activation scales)
hardware:
  gpu: null
  cpu_cores_physical: null
measurement:
  dataset: coco_val2017
  num_images: 500
  warmup_iters: 200
  measure_iters: 300
  batch_sizes: [1, 8]
  input_size: 640
  thread_count: null
  seed: 42
constraints:
  max_map_drop_pct: 1.0
  min_fps_bs1: 10        # INT8 recipes are the VNNI target — enforce threshold
